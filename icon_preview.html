<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图标预览</title>
<style>
  body { font-family: -apple-system, sans-serif; background: #FFF6F7; padding: 20px; }
  .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 10px rgba(244,63,94,0.06); }
  .section-header { display: flex; align-items: center; margin-bottom: 16px; }
  .section-icon-wrap {
    width: 24px; height: 24px; border-radius: 50%; background: #FF4E8D;
    flex-shrink: 0; margin-right: 8px; display: flex; align-items: center;
    justify-content: center; position: relative; box-shadow: 0 2px 6px rgba(255,78,141,0.2);
  }
  .icon-chat::before { content: ''; width: 12px; height: 9px; background: white; border-radius: 2px; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
  .icon-chat::after { content: ''; width: 8px; height: 1.5px; background: #FF4E8D; border-radius: 1px; position: absolute; top: 55%; left: 50%; transform: translateX(-50%); }
  .icon-user::before { content: ''; width: 8px; height: 8px; background: white; border-radius: 50%; position: absolute; top: 35%; left: 50%; transform: translateX(-50%); }
  .icon-user::after { content: ''; width: 12px; height: 8px; background: white; border-radius: 6px 6px 0 0; position: absolute; bottom: 30%; left: 50%; transform: translateX(-50%); }
  .icon-target::before { content: ''; width: 12px; height: 12px; border: 1.5px solid white; border-radius: 50%; position: absolute; }
  .icon-target::after { content: ''; width: 6px; height: 6px; border: 1.5px solid white; border-radius: 50%; position: absolute; }
  .icon-style::before { content: ''; width: 12px; height: 12px; border: 1.5px solid white; border-radius: 50%; position: absolute; }
  .icon-style::after { content: ''; width: 4px; height: 4px; background: white; border-radius: 50%; position: absolute; }
  .section-title { font-size: 15px; font-weight: 700; color: #1f2937; flex: 1; }
  .option-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .option-item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 10px; border-radius: 12px; border: 1px solid #f2f2f5; background: white; }
  .option-icon { width: 16px; height: 16px; border: 2px solid #a3a3a3; border-radius: 50%; position: relative; flex-shrink: 0; }
  .option-icon::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 8px; height: 8px; background: #a3a3a3; border-radius: 50%; }
  .option-label { font-size: 11px; color: #4a4a4a; text-align: center; line-height: 1.2; }
</style>
</head>
<body>
<h2>区块图标预览</h2>
<div class="card">
  <div class="section-header">
    <div class="section-icon-wrap icon-chat"></div>
    <span class="section-title">联系人昵称</span>
  </div>
  <input style="width:100%;height:44px;background:#f9fafb;border-radius:10px;padding:0 12px;font-size:14px;color:#1f2937;" placeholder="请输入联系人昵称">
</div>
<div class="card">
  <div class="section-header">
    <div class="section-icon-wrap icon-user"></div>
    <span class="section-title">他的身份</span>
  </div>
  <div class="option-grid">
    <div class="option-item"><div class="option-icon"></div><span class="option-label">暗恋对象</span></div>
    <div class="option-item"><div class="option-icon"></div><span class="option-label">男神</span></div>
    <div class="option-item"><div class="option-icon"></div><span class="option-label">暧昧对象</span></div>
    <div class="option-item"><div class="option-icon"></div><span class="option-label">追求者</span></div>
    <div class="option-item"><div class="option-icon"></div><span class="option-label">相亲对象</span></div>
    <div class="option-item"><div class="option-icon"></div><span class="option-label">普通朋友</span></div>
    <div class="option-item"><div class="option-icon"></div><span class="option-label">同学</span></div>
    <div class="option-item"><div class="option-icon"></div><span class="option-label">同事</span></div>
    <div class="option-item"><div class="option-icon"></div><span class="option-label">上司</span></div>
    <div class="option-item"><div class="option-icon"></div><span class="option-label">客户</span></div>
    <div class="option-item"><div class="option-icon"></div><span class="option-label">甲方</span></div>
    <div class="option-item"><div class="option-icon"></div><span class="option-label">前任</span></div>
    <div class="option-item"><div class="option-icon"></div><span class="option-label">网友</span></div>
    <div class="option-item"><div class="option-icon"></div><span class="option-label">游戏搭子</span></div>
    <div class="option-item"><div class="option-icon"></div><span class="option-label">想拒绝的人</span></div>
    <div class="option-item"><div class="option-icon"></div><span class="option-label">年上</span></div>
    <div class="option-item"><div class="option-icon"></div><span class="option-label">年下</span></div>
  </div>
</div>
<div class="card">
  <div class="section-header">
    <div class="section-icon-wrap icon-target"></div>
    <span class="section-title">回复目标</span>
  </div>
</div>
<div class="card">
  <div class="section-header">
    <div class="section-icon-wrap icon-style"></div>
    <span class="section-title">回复风格</span>
  </div>
</div>
</body>
</html>
