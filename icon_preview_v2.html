<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图标预览 - 新版</title>
<style>
  body { font-family: -apple-system, sans-serif; background: #FFF6F7; padding: 20px; margin: 0; }
  .card { background: white; border-radius: 40px; padding: 32px; margin-bottom: 24px; box-shadow: 0 8px 40px rgba(244,63,94,0.06); }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .section-icon-wrap {
    width: 64px; height: 64px; border-radius: 50%; background: #FF4E8D;
    flex-shrink: 0; margin-right: 16px; box-shadow: 0 4px 12px rgba(255,78,141,0.2);
    position: relative;
  }
  .icon-chat::before { content: ''; width: 36px; height: 26px; background: white; border-radius: 6px; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
  .icon-chat::after { content: ''; width: 24px; height: 4px; background: #FF4E8D; border-radius: 2px; position: absolute; top: 58%; left: 50%; transform: translateX(-50%); }
  .icon-user::before { content: ''; width: 20px; height: 20px; background: white; border-radius: 50%; position: absolute; top: 32%; left: 50%; transform: translateX(-50%); }
  .icon-user::after { content: ''; width: 32px; height: 20px; background: white; border-radius: 16px 16px 0 0; position: absolute; bottom: 18%; left: 50%; transform: translateX(-50%); }
  .icon-target::before { content: ''; width: 32px; height: 32px; border: 4px solid white; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
  .icon-target::after { content: ''; width: 12px; height: 12px; background: white; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
  .icon-style::before { content: ''; width: 32px; height: 32px; border: 4px solid white; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
  .icon-style::after { content: ''; width: 12px; height: 12px; background: white; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
  .section-title { font-size: 30px; font-weight: 700; color: #1f2937; flex: 1; }
  .option-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .option-item { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 20px 16px; border-radius: 24px; border: 2px solid #f2f2f5; background: white; }
  .option-icon { width: 32px; height: 32px; border: 4px solid #a3a3a3; border-radius: 50%; position: relative; flex-shrink: 0; }
  .option-icon::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 16px; height: 16px; background: #a3a3a3; border-radius: 50%; }
  .option-label { font-size: 22px; color: #4a4a4a; text-align: center; line-height: 1.2; }
</style>
</head>
<body>
<div class="card">
  <div class="section-header">
    <div class="section-icon-wrap icon-chat"></div>
    <span class="section-title">联系人昵称</span>
  </div>
  <input style="width:100%;height:88px;background:#f9fafb;border-radius:20px;padding:0 24px;font-size:28px;color:#1f2937;" placeholder="请输入联系人昵称">
</div>
<div class="card">
  <div class="section-header">
    <div class="section-icon-wrap icon-user"></div>
    <span class="section-title">他的身份</span>
  </div>
  <div class="option-grid">
    <div class="option-item"><div class="option-icon"></div><span class="option-label">暗恋对象</span></div>
    <div class="option-item"><div class="option-icon"></div><span class="option-label">男神</span></div>
    <div class="option-item"><div class="option-icon"></div><span class="option-label">暧昧对象</span></div>
    <div class="option-item"><div class="option-icon"></div><span class="option-label">追求者</span></div>
    <div class="option-item"><div class="option-icon"></div><span class="option-label">相亲对象</span></div>
    <div class="option-item"><div class="option-icon"></div><span class="option-label">普通朋友</span></div>
    <div class="option-item"><div class="option-icon"></div><span class="option-label">同学</span></div>
    <div class="option-item"><div class="option-icon"></div><span class="option-label">同事</span></div>
    <div class="option-item"><div class="option-icon"></div><span class="option-label">上司</span></div>
    <div class="option-item"><div class="option-icon"></div><span class="option-label">客户</span></div>
    <div class="option-item"><div class="option-icon"></div><span class="option-label">甲方</span></div>
    <div class="option-item"><div class="option-icon"></div><span class="option-label">前任</span></div>
    <div class="option-item"><div class="option-icon"></div><span class="option-label">网友</span></div>
    <div class="option-item"><div class="option-icon"></div><span class="option-label">游戏搭子</span></div>
    <div class="option-item"><div class="option-icon"></div><span class="option-label">想拒绝的人</span></div>
    <div class="option-item"><div class="option-icon"></div><span class="option-label">年上</span></div>
    <div class="option-item"><div class="option-icon"></div><span class="option-label">年下</span></div>
  </div>
</div>
<div class="card">
  <div class="section-header">
    <div class="section-icon-wrap icon-target"></div>
    <span class="section-title">回复目标</span>
  </div>
</div>
<div class="card">
  <div class="section-header">
    <div class="section-icon-wrap icon-style"></div>
    <span class="section-title">回复风格</span>
  </div>
</div>
</body>
</html>
